<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1B2A4A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Navette Express">
  <meta name="description" content="Navette Express - Transport collectif premium à Abidjan. Réservez votre place, suivez votre bus en temps réel.">
  
  <link rel="icon" type="image/png" sizes="32x32" href="images/icons/icon-32x32.png">
  <link rel="apple-touch-icon" href="images/icons/icon-192x192.png">
  <link rel="manifest" href="manifest.json">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <title>Navette Express - Passagers</title>
  
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Montserrat', sans-serif;
      background: #0F1A2E;
      color: #FFFFFF;
      min-height: 100vh;
      overflow: hidden;
    }
    
    .splash {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    
    .splash-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
    }
    
    .splash-bg img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .splash-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(15,26,46,0.3) 0%, rgba(15,26,46,0.95) 100%);
      z-index: 1;
    }
    
    .splash-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 40px;
    }
    
    .logo-container {
      width: 120px;
      height: 120px;
      margin: 0 auto 24px;
      background: rgba(255,255,255,0.1);
      border-radius: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(10px);
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    .logo-container img {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }
    
    .logo-text {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .logo-text span {
      color: #C8A951;
    }
    
    .tagline {
      font-size: 16px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 40px;
    }
    
    .loader {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #2EC4B6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .splash-footer {
      position: absolute;
      bottom: 40px;
      left: 0;
      right: 0;
      text-align: center;
      z-index: 2;
    }
    
    .powered-by {
      font-size: 12px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 4px;
    }
    
    .company {
      font-size: 14px;
      font-weight: 600;
      color: #C8A951;
    }
  </style>
</head>
<body>
  <div class="splash">
    <div class="splash-bg">
      <picture>
        <source srcset="images/ecrans/passagers-splash.webp" type="image/webp">
        <img src="images/ecrans/passagers-splash.jpg" alt="Navette Express" loading="eager">
      </picture>
    </div>
    <div class="splash-overlay"></div>
    
    <div class="splash-content">
      <div class="logo-container">
        <img src="images/logo/logo-navette-express.png" alt="Logo" onerror="this.style.display='none'">
      </div>
      <h1 class="logo-text">Navette <span>Express</span></h1>
      <p class="tagline">Transport collectif premium</p>
      <div class="loader"></div>
    </div>
    
    <div class="splash-footer">
      <p class="powered-by">Powered by</p>
      <p class="company">JAEBETS HOLDING</p>
    </div>
  </div>
  
  <script>
    // Redirection après 2.5 secondes
    setTimeout(function() {
      const hasSeenOnboarding = localStorage.getItem('hasSeenOnboarding');
      const isLoggedIn = localStorage.getItem('isLoggedIn');
      
      if (!hasSeenOnboarding) {
        window.location.href = 'onboarding.html';
      } else if (!isLoggedIn) {
        window.location.href = 'connexion.html';
      } else {
        window.location.href = 'accueil.html';
      }
    }, 2500);
    
    // Enregistrement Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(err) {
        console.log('SW registration failed:', err);
      });
    }
  </script>
</body>
</html>
