<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1B2A4A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Navette Express">
  <meta name="description" content="Page erreur Navette Express">
  
  <link rel="icon" type="image/png" sizes="32x32" href="images/icons/icon-32x32.png">
  <link rel="apple-touch-icon" href="images/icons/icon-192x192.png">
  <link rel="manifest" href="manifest.json">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/app.css">
  
  <title>Erreur - Navette Express</title>
  
  <style>
    .error-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }
    
    .error-illustration {
      width: 200px;
      height: 200px;
      margin-bottom: 32px;
    }
    
    .error-illustration svg {
      width: 100%;
      height: 100%;
    }
    
    .error-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    
    .error-text {
      font-size: 15px;
      line-height: 1.6;
      color: rgba(255,255,255,0.7);
      max-width: 300px;
      margin-bottom: 32px;
    }
    
    .error-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      color: #0F1A2E;
      background: #C8A951;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      margin-bottom: 16px;
    }
    
    .error-btn svg {
      width: 20px;
      height: 20px;
    }
    
    .error-btn.secondary {
      background: rgba(46,196,182,0.2);
      color: #2EC4B6;
    }
    
    .error-link {
      font-size: 14px;
      color: #2EC4B6;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="error-container" id="errorContainer">
    <!-- Contenu dynamique selon le type d'erreur -->
  </div>
  
  <script src="js/app.js"></script>
  <script>
    // Types d'erreur possibles
    const errorTypes = {
      'connexion': {
        title: 'Impossible de se connecter',
        text: 'Vérifiez votre connexion Internet et réessayez.',
        icon: 'wifi',
        btnText: 'Réessayer',
        btnAction: 'retry'
      },
      'paiement': {
        title: 'Paiement non validé',
        text: 'Le paiement n\'a pas été validé. Vérifiez vos fonds ou votre carte, puis réessayez.',
        icon: 'card',
        btnText: 'Réessayer le paiement',
        btnAction: 'payment'
      },
      'vide-trajets': {
        title: 'Aucun trajet',
        text: 'Vous n\'avez encore aucun trajet enregistré. Réservez votre première navette pour commencer.',
        icon: 'bus',
        btnText: 'Réserver une navette',
        btnAction: 'booking'
      },
      'vide-notifications': {
        title: 'Aucune notification',
        text: 'Vous n\'avez aucune notification pour le moment. Nous vous tiendrons informé de vos prochains déplacements.',
        icon: 'bell',
        btnText: 'Retour à l\'accueil',
        btnAction: 'home'
      },
      '404': {
        title: 'Page introuvable',
        text: 'La page que vous recherchez n\'existe pas ou a été déplacée.',
        icon: 'search',
        btnText: 'Retour à l\'accueil',
        btnAction: 'home'
      }
    };
    
    // Illustrations SVG
    const icons = {
      wifi: `<svg viewBox="0 0 200 200" fill="none">
        <circle cx="100" cy="100" r="80" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.3)" stroke-width="2"/>
        <path d="M100 140 L100 140" stroke="#E74C3C" stroke-width="8" stroke-linecap="round"/>
        <path d="M70 110 Q100 80 130 110" stroke="#E74C3C" stroke-width="6" stroke-linecap="round" fill="none"/>
        <path d="M50 90 Q100 50 150 90" stroke="#E74C3C" stroke-width="6" stroke-linecap="round" fill="none"/>
        <line x1="60" y1="60" x2="140" y2="140" stroke="#E74C3C" stroke-width="4" stroke-linecap="round"/>
      </svg>`,
      card: `<svg viewBox="0 0 200 200" fill="none">
        <circle cx="100" cy="100" r="80" fill="rgba(239,68,68,0.1)" stroke="rgba(239,68,68,0.3)" stroke-width="2"/>
        <rect x="50" y="70" width="100" height="60" rx="8" fill="rgba(255,255,255,0.1)" stroke="#E74C3C" stroke-width="3"/>
        <line x1="50" y1="90" x2="150" y2="90" stroke="#E74C3C" stroke-width="3"/>
        <circle cx="130" cy="110" r="8" stroke="#E74C3C" stroke-width="2" fill="none"/>
        <line x1="60" y1="60" x2="140" y2="140" stroke="#E74C3C" stroke-width="4" stroke-linecap="round"/>
      </svg>`,
      bus: `<svg viewBox="0 0 200 200" fill="none">
        <circle cx="100" cy="100" r="80" fill="rgba(46,196,182,0.1)" stroke="rgba(46,196,182,0.3)" stroke-width="2"/>
        <rect x="60" y="60" width="80" height="70" rx="10" fill="rgba(255,255,255,0.1)" stroke="#2EC4B6" stroke-width="3"/>
        <rect x="70" y="70" width="25" height="20" rx="3" fill="rgba(46,196,182,0.3)"/>
        <rect x="105" y="70" width="25" height="20" rx="3" fill="rgba(46,196,182,0.3)"/>
        <circle cx="80" cy="140" r="10" stroke="#2EC4B6" stroke-width="3" fill="none"/>
        <circle cx="120" cy="140" r="10" stroke="#2EC4B6" stroke-width="3" fill="none"/>
      </svg>`,
      bell: `<svg viewBox="0 0 200 200" fill="none">
        <circle cx="100" cy="100" r="80" fill="rgba(200,169,81,0.1)" stroke="rgba(200,169,81,0.3)" stroke-width="2"/>
        <path d="M100 50 L100 60" stroke="#C8A951" stroke-width="3" stroke-linecap="round"/>
        <path d="M70 130 L130 130" stroke="#C8A951" stroke-width="3" stroke-linecap="round"/>
        <path d="M75 130 L75 90 Q75 65 100 65 Q125 65 125 90 L125 130" stroke="#C8A951" stroke-width="3" fill="none"/>
        <circle cx="100" cy="145" r="10" stroke="#C8A951" stroke-width="3" fill="none"/>
      </svg>`,
      search: `<svg viewBox="0 0 200 200" fill="none">
        <circle cx="100" cy="100" r="80" fill="rgba(46,196,182,0.1)" stroke="rgba(46,196,182,0.3)" stroke-width="2"/>
        <circle cx="90" cy="90" r="30" stroke="#2EC4B6" stroke-width="4" fill="none"/>
        <line x1="112" y1="112" x2="135" y2="135" stroke="#2EC4B6" stroke-width="4" stroke-linecap="round"/>
        <text x="82" y="98" fill="#2EC4B6" font-size="24" font-weight="bold">?</text>
      </svg>`
    };
    
    // Déterminer le type d'erreur
    const urlParams = new URLSearchParams(window.location.search);
    const errorType = urlParams.get('type') || 'connexion';
    const error = errorTypes[errorType] || errorTypes['connexion'];
    
    // Afficher l'erreur
    document.getElementById('errorContainer').innerHTML = `
      <div class="error-illustration">
        ${icons[error.icon]}
      </div>
      <h1 class="error-title">${error.title}</h1>
      <p class="error-text">${error.text}</p>
      <button class="error-btn" onclick="handleAction('${error.btnAction}')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>
        </svg>
        ${error.btnText}
      </button>
      <a href="accueil.html" class="error-link">Retour à l'accueil</a>
    `;
    
    function handleAction(action) {
      switch(action) {
        case 'retry':
          location.reload();
          break;
        case 'payment':
          window.location.href = 'paiement.html';
          break;
        case 'booking':
          window.location.href = 'lignes.html';
          break;
        case 'home':
        default:
          window.location.href = 'accueil.html';
      }
    }
  </script>
</body>
</html>
