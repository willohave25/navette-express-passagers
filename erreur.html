<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1B2A4A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Navette Express">
  <meta name="description" content="Page non trouvée - Navette Express Abidjan.">
  
  <!-- Favicon et icônes -->
  <link rel="icon" type="image/png" sizes="32x32" href="images/icons/icon-32x32.png">
  <link rel="apple-touch-icon" href="images/icons/icon-192x192.png">
  
  <!-- Manifest PWA -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/app.css">
  
  <title>Page non trouvée - Navette Express</title>
</head>
<body class="no-nav">
  <!-- Contenu principal -->
  <main class="error-page">
    <!-- Illustration SVG -->
    <div class="error-illustration">
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Cercle de fond -->
        <circle cx="100" cy="100" r="90" fill="rgba(46, 196, 182, 0.05)" stroke="rgba(46, 196, 182, 0.2)" stroke-width="2"/>
        
        <!-- Route en pointillés -->
        <path d="M30 140 Q60 100 100 100 T170 60" stroke="rgba(46, 196, 182, 0.3)" stroke-width="4" stroke-dasharray="8 6" fill="none"/>
        
        <!-- Bus perdu -->
        <g transform="translate(85, 85)">
          <!-- Corps du bus -->
          <rect x="0" y="0" width="30" height="20" rx="4" fill="#1B2A4A" stroke="#2EC4B6" stroke-width="2"/>
          <!-- Fenêtres -->
          <rect x="4" y="4" width="6" height="5" rx="1" fill="#2EC4B6" opacity="0.5"/>
          <rect x="12" y="4" width="6" height="5" rx="1" fill="#2EC4B6" opacity="0.5"/>
          <rect x="20" y="4" width="6" height="5" rx="1" fill="#2EC4B6" opacity="0.5"/>
          <!-- Roues -->
          <circle cx="8" cy="20" r="4" fill="#0F1A2E" stroke="#2EC4B6" stroke-width="1.5"/>
          <circle cx="22" cy="20" r="4" fill="#0F1A2E" stroke="#2EC4B6" stroke-width="1.5"/>
        </g>
        
        <!-- Point d'interrogation -->
        <g transform="translate(120, 60)">
          <circle cx="15" cy="15" r="18" fill="rgba(200, 169, 81, 0.2)" stroke="#C8A951" stroke-width="2"/>
          <text x="15" y="22" text-anchor="middle" fill="#C8A951" font-size="20" font-weight="bold">?</text>
        </g>
        
        <!-- Panneau de signalisation -->
        <g transform="translate(40, 50)">
          <rect x="0" y="0" width="30" height="25" rx="3" fill="#E74C3C"/>
          <line x1="5" y1="5" x2="25" y2="20" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <line x1="25" y1="5" x2="5" y2="20" stroke="white" stroke-width="3" stroke-linecap="round"/>
          <rect x="13" y="25" width="4" height="20" fill="#A0AEC0"/>
        </g>
      </svg>
    </div>
    
    <!-- Code erreur -->
    <div class="error-code" id="error-code">404</div>
    
    <!-- Message -->
    <h1 class="error-title">Page non trouvée</h1>
    <p class="error-message" id="error-message">
      Oups ! Il semble que cette page ait pris un autre itinéraire. 
      Elle n'existe pas ou a été déplacée.
    </p>
    
    <!-- Actions -->
    <div class="error-actions">
      <button class="btn btn-primary btn-lg" onclick="navigateTo('accueil.html')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Retour à l'accueil
      </button>
      
      <button class="btn btn-ghost" onclick="history.back()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Page précédente
      </button>
    </div>
    
    <!-- Aide -->
    <div class="error-help">
      <p>Besoin d'aide ?</p>
      <a href="https://wa.me/2250703285359" target="_blank" class="help-link">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
        </svg>
        Contacter le support
      </a>
    </div>
  </main>
  
  <!-- Styles spécifiques -->
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-xl);
      text-align: center;
      background: linear-gradient(180deg, var(--primary-blue) 0%, var(--dark-bg) 100%);
    }
    
    .error-illustration {
      width: 200px;
      height: 200px;
      margin-bottom: var(--spacing-lg);
      animation: float 3s ease-in-out infinite;
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    .error-code {
      font-size: 96px;
      font-weight: var(--font-bold);
      color: var(--secondary-turquoise);
      line-height: 1;
      margin-bottom: var(--spacing-sm);
      text-shadow: 0 0 40px rgba(46, 196, 182, 0.3);
    }
    
    .error-title {
      font-size: 24px;
      font-weight: var(--font-bold);
      margin-bottom: var(--spacing-md);
    }
    
    .error-message {
      font-size: 15px;
      color: var(--text-secondary);
      max-width: 300px;
      line-height: 1.6;
      margin-bottom: var(--spacing-xl);
    }
    
    .error-actions {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-md);
      width: 100%;
      max-width: 280px;
      margin-bottom: var(--spacing-xl);
    }
    
    .error-actions .btn svg {
      margin-right: var(--spacing-sm);
    }
    
    .error-help {
      padding-top: var(--spacing-lg);
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .error-help p {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: var(--spacing-sm);
    }
    
    .help-link {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-sm);
      color: #25D366;
      font-size: 14px;
      font-weight: var(--font-medium);
      text-decoration: none;
    }
    
    .help-link:hover {
      text-decoration: underline;
    }
  </style>
  
  <!-- Scripts -->
  <script src="js/app.js"></script>
  <script>
    /* Détecter le type d'erreur via URL params */
    document.addEventListener('DOMContentLoaded', function() {
      const urlParams = new URLSearchParams(window.location.search);
      const errorType = urlParams.get('type');
      
      if (errorType === '500' || errorType === 'server') {
        document.getElementById('error-code').textContent = '500';
        document.querySelector('.error-title').textContent = 'Erreur serveur';
        document.getElementById('error-message').textContent = 
          'Notre serveur rencontre des difficultés techniques. Veuillez réessayer dans quelques instants.';
      } else if (errorType === 'offline') {
        document.getElementById('error-code').textContent = '📡';
        document.querySelector('.error-title').textContent = 'Hors connexion';
        document.getElementById('error-message').textContent = 
          'Vous semblez être hors ligne. Vérifiez votre connexion internet et réessayez.';
      }
    });
  </script>
</body>
</html>
