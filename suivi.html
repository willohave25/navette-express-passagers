<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1B2A4A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Navette Express">
  <meta name="description" content="Suivez votre navette en temps réel - Position GPS, estimation d'arrivée et infos chauffeur.">
  
  <link rel="icon" type="image/png" sizes="32x32" href="images/icons/icon-32x32.png">
  <link rel="apple-touch-icon" href="images/icons/icon-192x192.png">
  <link rel="manifest" href="manifest.json">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/app.css">
  
  <title>Suivi - Navette Express</title>
  
  <style>
    .map-container {
      position: relative;
      height: 55vh;
      min-height: 300px;
    }
    
    .map-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .map-overlay {
      position: absolute;
      top: 16px;
      left: 16px;
      right: 16px;
    }
    
    .eta-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: rgba(15, 26, 46, 0.9);
      border-radius: 20px;
      backdrop-filter: blur(10px);
    }
    
    .eta-dot {
      width: 10px;
      height: 10px;
      background: #2EC4B6;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
    }
    
    .eta-text {
      font-size: 14px;
      font-weight: 600;
    }
    
    .eta-time {
      color: #2EC4B6;
    }
    
    .tracking-panel {
      background: #0F1A2E;
      border-radius: 24px 24px 0 0;
      margin-top: -24px;
      position: relative;
      z-index: 10;
      padding: 24px 16px;
      padding-bottom: 100px;
    }
    
    .panel-handle {
      width: 40px;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 2px;
      margin: 0 auto 20px;
    }
    
    .driver-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
    }
    
    .driver-avatar {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #2EC4B6 0%, #1B2A4A 100%);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: #FFFFFF;
    }
    
    .driver-info {
      flex: 1;
    }
    
    .driver-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .driver-details {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
    }
    
    .driver-rating {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-top: 4px;
    }
    
    .driver-rating svg {
      width: 14px;
      height: 14px;
      color: #C8A951;
      fill: #C8A951;
    }
    
    .driver-rating span {
      font-size: 13px;
      font-weight: 500;
    }
    
    .driver-actions {
      display: flex;
      gap: 10px;
    }
    
    .action-btn {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(46, 196, 182, 0.2);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      color: #2EC4B6;
    }
    
    .action-btn svg {
      width: 20px;
      height: 20px;
    }
    
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 12px;
    }
    
    .stops-list {
      position: relative;
    }
    
    .stops-line {
      position: absolute;
      left: 11px;
      top: 24px;
      bottom: 24px;
      width: 2px;
      background: rgba(255, 255, 255, 0.1);
    }
    
    .stop-item {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 20px;
      position: relative;
    }
    
    .stop-item:last-child {
      margin-bottom: 0;
    }
    
    .stop-dot {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      z-index: 1;
    }
    
    .stop-dot.passed {
      background: #2EC4B6;
    }
    
    .stop-dot.current {
      background: #C8A951;
      box-shadow: 0 0 0 4px rgba(200, 169, 81, 0.3);
    }
    
    .stop-dot.upcoming {
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.3);
    }
    
    .stop-dot svg {
      width: 12px;
      height: 12px;
      color: #0F1A2E;
    }
    
    .stop-info {
      flex: 1;
      padding-top: 2px;
    }
    
    .stop-name {
      font-size: 15px;
      font-weight: 500;
      margin-bottom: 2px;
    }
    
    .stop-item.current .stop-name {
      color: #C8A951;
    }
    
    .stop-time {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.5);
    }
    
    .stop-item.current .stop-time {
      color: #C8A951;
    }
  </style>
</head>
<body class="with-nav">
  <!-- Map -->
  <div class="map-container">
    <picture>
      <source srcset="images/ecrans/passagers-carte.webp" type="image/webp">
      <img src="images/ecrans/passagers-carte.jpg" alt="Carte de suivi" class="map-image" loading="eager">
    </picture>
    
    <div class="map-overlay">
      <div class="eta-badge">
        <span class="eta-dot"></span>
        <span class="eta-text">Arrivée dans <span class="eta-time">8 min</span></span>
      </div>
    </div>
  </div>
  
  <!-- Panel -->
  <div class="tracking-panel">
    <div class="panel-handle"></div>
    
    <!-- Chauffeur -->
    <div class="driver-card">
      <div class="driver-avatar">KA</div>
      <div class="driver-info">
        <p class="driver-name">Kouamé Ange</p>
        <p class="driver-details">Bus Hyundai County • AB 1234 CI</p>
        <div class="driver-rating">
          <svg viewBox="0 0 24 24"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
          <span>4.9</span>
        </div>
      </div>
      <div class="driver-actions">
        <button class="action-btn" onclick="callDriver()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
          </svg>
        </button>
        <button class="action-btn" onclick="messageDriver()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
          </svg>
        </button>
      </div>
    </div>
    
    <!-- Arrêts -->
    <h3 class="section-title">Itinéraire</h3>
    
    <div class="stops-list">
      <div class="stops-line"></div>
      
      <div class="stop-item passed">
        <div class="stop-dot passed">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div class="stop-info">
          <p class="stop-name">Terminus Yopougon</p>
          <p class="stop-time">Départ 06:30</p>
        </div>
      </div>
      
      <div class="stop-item passed">
        <div class="stop-dot passed">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div class="stop-info">
          <p class="stop-name">Carrefour Académie</p>
          <p class="stop-time">06:38</p>
        </div>
      </div>
      
      <div class="stop-item current">
        <div class="stop-dot current">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </div>
        <div class="stop-info">
          <p class="stop-name">Carrefour Wassakara</p>
          <p class="stop-time">En approche • 8 min</p>
        </div>
      </div>
      
      <div class="stop-item upcoming">
        <div class="stop-dot upcoming"></div>
        <div class="stop-info">
          <p class="stop-name">Gare Adjamé</p>
          <p class="stop-time">~07:00</p>
        </div>
      </div>
      
      <div class="stop-item upcoming">
        <div class="stop-dot upcoming"></div>
        <div class="stop-info">
          <p class="stop-name">Plateau - Terminus</p>
          <p class="stop-time">~07:15</p>
        </div>
      </div>
    </div>
  </div>
  
  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="accueil.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Accueil</span>
    </a>
    <a href="lignes.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <span>Lignes</span>
    </a>
    <a href="suivi.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="3 11 22 2 13 21 11 13 3 11"/>
      </svg>
      <span>Suivi</span>
    </a>
    <a href="notifications.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 01-3.46 0"/>
      </svg>
      <span>Notifs</span>
      <span class="nav-badge">3</span>
    </a>
    <a href="profil.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Profil</span>
    </a>
  </nav>
  
  <script src="js/app.js"></script>
  <script>
    function callDriver() {
      window.location.href = 'tel:+2250102030405';
    }
    
    function messageDriver() {
      alert('Fonctionnalité bientôt disponible');
    }
  </script>
</body>
</html>
