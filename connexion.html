<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1B2A4A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Navette Express">
  <meta name="description" content="Connexion à Navette Express - Accédez à votre compte pour réserver vos trajets.">
  
  <link rel="icon" type="image/png" sizes="32x32" href="images/icons/icon-32x32.png">
  <link rel="apple-touch-icon" href="images/icons/icon-192x192.png">
  <link rel="manifest" href="manifest.json">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/app.css">
  
  <title>Connexion - Navette Express</title>
  
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 24px;
      padding-top: calc(60px + env(safe-area-inset-top, 0px));
    }
    
    .auth-header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .logo-container {
      width: 80px;
      height: 80px;
      margin: 0 auto 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    
    .logo-container img {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }
    
    .auth-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    
    .auth-subtitle {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
    }
    
    .auth-form {
      flex: 1;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.8);
      margin-bottom: 8px;
    }
    
    .form-input {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      font-family: inherit;
      color: #FFFFFF;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      transition: all 0.2s;
    }
    
    .form-input:focus {
      outline: none;
      border-color: #2EC4B6;
      background: rgba(46,196,182,0.05);
    }
    
    .form-input::placeholder {
      color: rgba(255,255,255,0.3);
    }
    
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 14px;
      color: #2EC4B6;
      text-decoration: none;
      margin-top: 8px;
    }
    
    .submit-btn {
      width: 100%;
      padding: 16px;
      margin-top: 24px;
      font-size: 16px;
      font-weight: 600;
      color: #0F1A2E;
      background: #C8A951;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.2s;
    }
    
    .submit-btn:hover {
      background: #d4b85e;
    }
    
    .submit-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .auth-footer {
      text-align: center;
      padding-top: 24px;
      border-top: 1px solid rgba(255,255,255,0.1);
      margin-top: 32px;
    }
    
    .auth-footer p {
      font-size: 15px;
      color: rgba(255,255,255,0.6);
    }
    
    .auth-footer a {
      color: #2EC4B6;
      text-decoration: none;
      font-weight: 500;
    }
    
    .social-divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 32px 0;
    }
    
    .social-divider::before,
    .social-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.1);
    }
    
    .social-divider span {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
    }
    
    .social-btn {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px;
      font-size: 15px;
      font-weight: 500;
      color: #FFFFFF;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      cursor: pointer;
      font-family: inherit;
    }
    
    .social-btn svg {
      width: 20px;
      height: 20px;
    }
  </style>
</head>
<body class="no-nav">
  <div class="auth-container">
    <!-- Header -->
    <div class="auth-header">
      <div class="logo-container">
        <picture>
          <source srcset="images/logo/logo-jaebets.webp" type="image/webp">
          <img src="images/logo/logo-jaebets.png" alt="Logo" loading="eager">
        </picture>
      </div>
      <h1 class="auth-title">Se connecter à Navette Express</h1>
      <p class="auth-subtitle">Accédez à votre compte</p>
    </div>
    
    <!-- Formulaire -->
    <form class="auth-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label class="form-label">Téléphone ou email</label>
        <input type="text" class="form-input" id="loginId" placeholder="Ex : 07 03 28 53 59 ou email@exemple.com" required>
      </div>
      
      <div class="form-group">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-input" id="password" placeholder="Votre mot de passe" required>
        <a href="#" class="forgot-link" onclick="alert('Fonctionnalité à venir')">Mot de passe oublié ? Réinitialiser</a>
      </div>
      
      <button type="submit" class="submit-btn" id="submitBtn">Se connecter</button>
      
      <div class="social-divider">
        <span>ou</span>
      </div>
      
      <button type="button" class="social-btn" onclick="alert('Connexion Google à venir')">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continuer avec Google
      </button>
    </form>
    
    <!-- Footer -->
    <div class="auth-footer">
      <p>Pas encore de compte ? <a href="inscription.html">Créer un compte</a></p>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="js/app.js"></script>
  <script>
    /* Afficher un message d'erreur sous le bouton */
    function afficherErreur(msg) {
      let el = document.getElementById('erreurMsg');
      if (!el) {
        el = document.createElement('p');
        el.id = 'erreurMsg';
        el.style.cssText = 'color:#E74C3C;font-size:14px;text-align:center;margin-top:12px;';
        document.getElementById('submitBtn').after(el);
      }
      el.textContent = msg;
    }

    async function handleLogin(e) {
      e.preventDefault();

      const btn = document.getElementById('submitBtn');
      btn.textContent = 'Connexion...';
      btn.disabled = true;

      const identifier = document.getElementById('loginId').value.trim();
      const password   = document.getElementById('password').value;

      try {
        await connecterUtilisateur(identifier, password);
        window.location.href = 'accueil.html';
      } catch (err) {
        btn.textContent = 'Se connecter';
        btn.disabled = false;
        afficherErreur('Identifiants incorrects. Vérifiez votre téléphone/email et mot de passe.');
      }
    }
  </script>
</body>
</html>
