<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1B2A4A">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Navette Express">
  <meta name="description" content="Consultez toutes les lignes de navettes disponibles à Abidjan - Yopougon, Abobo, Cocody, Plateau et plus.">
  
  <link rel="icon" type="image/png" sizes="32x32" href="images/icons/icon-32x32.png">
  <link rel="apple-touch-icon" href="images/icons/icon-192x192.png">
  <link rel="manifest" href="manifest.json">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="css/app.css">
  
  <title>Lignes - Navette Express</title>
  
  <style>
    .hero-banner {
      position: relative;
      height: 180px;
      margin: 16px;
      border-radius: 16px;
      overflow: hidden;
    }
    
    .hero-banner img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(15, 26, 46, 0.9) 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px;
    }
    
    .hero-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .hero-subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.7);
    }
    
    .filters {
      display: flex;
      gap: 8px;
      padding: 0 16px;
      margin-bottom: 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    
    .filters::-webkit-scrollbar {
      display: none;
    }
    
    .filter-btn {
      flex-shrink: 0;
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.7);
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-family: inherit;
    }
    
    .filter-btn.active {
      color: #0F1A2E;
      background: #2EC4B6;
    }
    
    .lines-list {
      padding: 0 16px 100px;
    }
    
    .line-card {
      display: flex;
      gap: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    
    .line-card:hover {
      background: rgba(255, 255, 255, 0.08);
    }
    
    .line-image {
      width: 70px;
      height: 70px;
      border-radius: 10px;
      object-fit: cover;
      flex-shrink: 0;
    }
    
    .line-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    
    .line-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 4px;
    }
    
    .line-name {
      font-size: 15px;
      font-weight: 600;
    }
    
    .line-status {
      padding: 3px 8px;
      font-size: 10px;
      font-weight: 600;
      border-radius: 10px;
    }
    
    .line-status.active {
      background: rgba(46, 196, 182, 0.2);
      color: #2EC4B6;
    }
    
    .line-status.waiting {
      background: rgba(200, 169, 81, 0.2);
      color: #C8A951;
    }
    
    .line-status.full {
      background: rgba(239, 68, 68, 0.2);
      color: #EF4444;
    }
    
    .line-details {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 6px;
    }
    
    .line-price {
      font-size: 14px;
      font-weight: 600;
      color: #C8A951;
    }
  </style>
</head>
<body class="with-nav">
  <!-- Header -->
  <header class="header">
    <button class="header-btn" onclick="history.back()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <h1 class="header-title">Lignes disponibles</h1>
    <button class="header-btn" onclick="navigateTo('notifications.html')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
        <circle cx="11" cy="11" r="8"/>
        <path d="M21 21l-4.35-4.35"/>
      </svg>
    </button>
  </header>
  
  <main class="page-with-header">
    <!-- Hero Banner -->
    <div class="hero-banner">
      <picture>
        <source srcset="images/ecrans/passagers-lignes.webp" type="image/webp">
        <img src="images/ecrans/passagers-lignes.jpg" alt="Lignes de navettes" loading="eager">
      </picture>
      <div class="hero-overlay">
        <h2 class="hero-title">Toutes les lignes</h2>
        <p class="hero-subtitle">5 lignes actives à Abidjan</p>
      </div>
    </div>
    
    <!-- Filtres -->
    <div class="filters">
      <button class="filter-btn active">Toutes</button>
      <button class="filter-btn">Yopougon</button>
      <button class="filter-btn">Abobo</button>
      <button class="filter-btn">Cocody</button>
      <button class="filter-btn">Plateau</button>
    </div>
    
    <!-- Liste des lignes -->
    <div class="lines-list" id="linesList">
      <p style="text-align:center;color:rgba(255,255,255,0.5);font-size:14px;padding:30px 0;">Chargement des lignes...</p>
    </div>
  </main>
  
  <!-- Bottom Navigation -->
  <nav class="bottom-nav">
    <a href="accueil.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
      <span>Accueil</span>
    </a>
    <a href="lignes.html" class="nav-item active">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      <span>Lignes</span>
    </a>
    <a href="suivi.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="3 11 22 2 13 21 11 13 3 11"/>
      </svg>
      <span>Suivi</span>
    </a>
    <a href="notifications.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 01-3.46 0"/>
      </svg>
      <span>Notifs</span>
      <span class="nav-badge">3</span>
    </a>
    <a href="profil.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      <span>Profil</span>
    </a>
  </nav>
  
  <script src="js/app.js"></script>
  <script src="supabase-config.js"></script>
  <script>
    const statusMap = {
      active:   { cls: 'active',  label: 'Active' },
      inactive: { cls: 'waiting', label: 'En attente' },
      full:     { cls: 'full',    label: 'Complète' }
    };

    function renderCard(l) {
      const s = statusMap[l.statut] || statusMap[l.status] || { cls: 'waiting', label: l.statut || '—' };
      const prix = l.prix_mensuel || l.price_monthly || 0;
      const prixFmt = prix ? new Intl.NumberFormat('fr-FR').format(prix) + ' FCFA / mois' : '—';
      const heure = l.heure_depart || l.departure_time || '';
      const capacite = l.capacity || '';
      const details = [heure, capacite ? capacite + ' places' : ''].filter(Boolean).join(' • ');
      return `
        <div class="line-card" onclick="navigateTo('detail-ligne.html?line_id=${l.id}')">
          <picture>
            <source srcset="images/ecrans/passagers-carte.webp" type="image/webp">
            <img src="images/ecrans/passagers-carte.jpg" alt="Ligne" class="line-image" loading="lazy">
          </picture>
          <div class="line-content">
            <div class="line-header">
              <span class="line-name">${l.depart || l.origin} → ${l.destination}</span>
              <span class="line-status ${s.cls}">${s.label}</span>
            </div>
            ${details ? `<p class="line-details">${details}</p>` : ''}
            <span class="line-price">${prixFmt}</span>
          </div>
        </div>`;
    }

    document.addEventListener('DOMContentLoaded', async function() {
      const container = document.getElementById('linesList');
      try {
        const lignes = await getLignesActives();
        if (!lignes || lignes.length === 0) {
          container.innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.5);font-size:14px;padding:30px 0;">Aucune ligne disponible pour le moment.</p>';
          return;
        }
        // Mettre à jour le sous-titre avec le nombre réel
        const subtitle = document.querySelector('.hero-subtitle');
        if (subtitle) subtitle.textContent = lignes.length + ' ligne' + (lignes.length > 1 ? 's' : '') + ' active' + (lignes.length > 1 ? 's' : '') + ' à Abidjan';
        container.innerHTML = lignes.map(renderCard).join('');
      } catch (err) {
        container.innerHTML = '<p style="text-align:center;color:rgba(255,255,255,0.5);font-size:14px;padding:30px 0;">Erreur de chargement. Vérifiez votre connexion.</p>';
      }
    });
  </script>
</body>
</html>
