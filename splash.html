<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1B2A4A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Navette Express">
  <meta name="description" content="Navette Express - Votre navette en un clic. Sûreté, Rapidité, Confort pour vos trajets à Abidjan.">
  
  <!-- Favicon et icônes -->
  <link rel="icon" type="image/png" sizes="32x32" href="images/icons/icon-32x32.png">
  <link rel="apple-touch-icon" href="images/icons/icon-192x192.png">
  
  <!-- Manifest PWA -->
  <link rel="manifest" href="manifest.json">
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Styles -->
  <link rel="stylesheet" href="css/app.css">
  
  <title>Navette Express - Passagers</title>
  
  <style>
    /* Styles spécifiques au splash */
    .splash-screen {
      background: linear-gradient(180deg, #0F1A2E 0%, #1B2A4A 100%);
    }
    
    .splash-logo-container {
      position: relative;
      margin-bottom: 32px;
    }
    
    .splash-logo {
      width: 140px;
      height: 140px;
      animation: splash-float 3s ease-in-out infinite;
    }
    
    .splash-logo-glow {
      position: absolute;
      inset: -20px;
      background: radial-gradient(circle, rgba(46, 196, 182, 0.3) 0%, transparent 70%);
      filter: blur(20px);
      animation: splash-glow 2s ease-in-out infinite alternate;
    }
    
    @keyframes splash-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    
    @keyframes splash-glow {
      from { opacity: 0.5; transform: scale(1); }
      to { opacity: 1; transform: scale(1.1); }
    }
    
    .splash-brand {
      margin-bottom: 48px;
    }
    
    .splash-title {
      font-size: 36px;
      font-weight: 700;
      color: #F8F9FA;
      margin-bottom: 8px;
      letter-spacing: -1px;
    }
    
    .splash-title span {
      color: #C8A951;
    }
    
    .splash-tagline {
      font-size: 16px;
      color: #A0AEC0;
      max-width: 280px;
      line-height: 1.6;
    }
    
    .splash-bottom {
      position: absolute;
      bottom: 80px;
      left: 0;
      right: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }
    
    .splash-loader {
      width: 48px;
      height: 48px;
      position: relative;
    }
    
    .splash-loader-ring {
      position: absolute;
      inset: 0;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
    }
    
    .splash-loader-progress {
      position: absolute;
      inset: 0;
      border: 3px solid transparent;
      border-top-color: #2EC4B6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    .splash-slogan {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      font-weight: 600;
      color: #2EC4B6;
      text-transform: uppercase;
      letter-spacing: 3px;
    }
    
    .splash-slogan-dot {
      width: 4px;
      height: 4px;
      background: #C8A951;
      border-radius: 50%;
    }
    
    .splash-credits {
      position: absolute;
      bottom: 24px;
      font-size: 11px;
      color: #6B7280;
    }
    
    .splash-credits a {
      color: #A0AEC0;
    }
  </style>
</head>
<body class="no-nav">
  <div class="splash-screen">
    <!-- Logo avec effet glow -->
    <div class="splash-logo-container">
      <div class="splash-logo-glow"></div>
      <picture class="splash-logo">
        <source srcset="images/logo/logo-jaebets.webp" type="image/webp">
        <img src="images/logo/logo-jaebets.png" alt="Logo Navette Express" width="140" height="140">
      </picture>
    </div>
    
    <!-- Marque -->
    <div class="splash-brand">
      <h1 class="splash-title">Navette <span>Express</span></h1>
      <p class="splash-tagline">Votre navette en un clic</p>
    </div>
    
    <!-- Accroche -->
    <p class="splash-tagline" style="margin-top: -24px;">
      Navette Express : sûr, rapide et confortable pour vos trajets à Abidjan
    </p>
    
    <!-- Section bas -->
    <div class="splash-bottom">
      <!-- Loader -->
      <div class="splash-loader">
        <div class="splash-loader-ring"></div>
        <div class="splash-loader-progress"></div>
      </div>
      
      <!-- Slogan -->
      <div class="splash-slogan">
        <span>Sûreté</span>
        <span class="splash-slogan-dot"></span>
        <span>Rapidité</span>
        <span class="splash-slogan-dot"></span>
        <span>Confort</span>
      </div>
    </div>
    
    <!-- Crédits -->
    <div class="splash-credits">
      Développé par <a href="https://w2k-digital.com" target="_blank">W2K-Digital</a>
    </div>
  </div>
  
  <!-- Scripts -->
  <script src="js/app.js"></script>
</body>
</html>
